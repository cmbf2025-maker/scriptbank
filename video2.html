<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Verification - Circular Frame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 50%; /* Makes it circular */
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            background: #f0f0f0;
            aspect-ratio: 1 / 1; /* Ensures perfect circle */
        }

        #video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover; /* Ensures video fills the circle */
            transform: scaleX(-1); /* Mirror effect for natural feel */
        }

        .face-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 3px dashed rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .face-guide::before {
            content: "👤 Position your face here";
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-shadow: 1px 1px 3px black;
            white-space: nowrap;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            border: 4px solid #4CAF50;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .overlay.recording {
            opacity: 1;
            border-color: #f44336;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 30px rgba(244, 67, 54, 0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .recording-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .recording-indicator.active {
            opacity: 1;
        }

        .recording-dot {
            width: 12px;
            height: 12px;
            background: #f44336;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .timer {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-family: monospace;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .timer.active {
            opacity: 1;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
            justify-content: center;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }

        .btn-secondary {
            background: #9e9e9e;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #757575;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(158, 158, 158, 0.3);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            background: #f5f5f5;
            color: #333;
            transition: all 0.3s ease;
        }

        .status.recording {
            background: #ffebee;
            color: #c62828;
        }

        .status.success {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .recordings-list {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #eee;
        }

        .recordings-list h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recordings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .recording-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .recording-info {
            font-size: 0.9rem;
            color: #666;
        }

        .recording-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.85rem;
            min-width: auto;
            flex: 1;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 Face Verification</h1>
        <p class="subtitle">Position your face inside the circular guide</p>

        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <div class="face-guide"></div>
            <div class="overlay" id="overlay"></div>
            <div class="recording-indicator" id="recordingIndicator">
                <span class="recording-dot"></span>
                <span>REC</span>
            </div>
            <div class="timer" id="timer">00:00</div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn-primary">
                <span>▶</span> Start Recording
            </button>
            <button id="stopBtn" class="btn-danger" disabled>
                <span>⏹</span> Stop Recording
            </button>
            <button id="downloadBtn" class="btn-secondary" disabled>
                <span>📥</span> Download Last
            </button>
        </div>

        <div class="status" id="status">
            Ready to start recording
        </div>

        <div id="error" class="error-message" style="display: none;"></div>

        <div class="recordings-list" id="recordingsList">
            <h3>📁 Saved Recordings</h3>
            <div class="recordings-grid" id="recordingsGrid">
                <!-- Recordings will appear here -->
            </div>
        </div>
    </div>
    <script src="/supabase.js"></script>
    <script src="/js/crypto-js.js"></script>
    <script src="/js/scriptbill.js"></script>
    <script>
        class FaceVerificationRecorder {
            constructor() {
                this.video = document.getElementById('video');
                this.startBtn = document.getElementById('startBtn');
                this.stopBtn = document.getElementById('stopBtn');
                this.downloadBtn = document.getElementById('downloadBtn');
                this.status = document.getElementById('status');
                this.error = document.getElementById('error');
                this.overlay = document.getElementById('overlay');
                this.recordingIndicator = document.getElementById('recordingIndicator');
                this.timer = document.getElementById('timer');
                this.recordingsGrid = document.getElementById('recordingsGrid');
                this.client        = Scriptbill.createClient();
                this.verifier       = "verifier";
                this.channel        = this.client.channel(this.verifier);
                this.note           = JSON.parse(Scriptbill.s.currentNote);

                this.mediaStream = null;
                this.mediaRecorder = null;
                this.recordedChunks = [];
                this.recordings = [];
                this.recordingStartTime = null;
                this.timerInterval = null;

                this.init();
            }

            async init() {
                try {
                    await this.setupCamera();
                    this.attachEventListeners();
                    this.updateStatus('Camera ready. Click "Start Recording" to begin.', 'ready');
                } catch (err) {
                    this.showError('Failed to access camera: ' + err.message);
                    this.updateStatus('Camera access failed', 'error');
                }
            }

            async setupCamera() {
                try {
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: 'user',
                            frameRate: { ideal: 30 }
                        },
                        audio: false
                    });
                    
                    this.video.srcObject = this.mediaStream;
                    
                    // Wait for video to be ready
                    return new Promise((resolve) => {
                        this.video.onloadedmetadata = () => {
                            this.video.play();
                            this.startRecording();
                            setTimeout(()=>{
                                this.updateStatus("Please place your face in the center of the circle");
                                this.saveRecording()
                                 setTimeout(()=>{
                                    this.updateStatus("Please move away from the camera");
                                    this.saveRecording()
                                     setTimeout(()=>{
                                        this.updateStatus("Smile");
                                        this.saveRecording()
                                         setTimeout(()=>{
                                            this.updateStatus("Turn your face to the right slowly");
                                            this.saveRecording()
                                             setTimeout(()=>{
                                                this.updateStatus("Turn your face to the left slowly");
                                                this.saveRecording()
                                                 setTimeout(()=>{
                                                    this.updateStatus("Please move close to the camera");
                                                    this.saveRecording()
                                                     setTimeout(()=>{
                                                        this.updateStatus("Smile");
                                                        this.saveRecording()
                                                         setTimeout(()=>{
                                                            this.updateStatus("Turn your face to the left");
                                                            this.saveRecording()
                                                             setTimeout(()=>{
                                                                this.updateStatus("Turn your face to the right");
                                                                this.saveRecording()
                                                                this.stopRecording();
                                                            }, 5000);
                                                        }, 5000);
                                                    }, 5000);
                                                }, 5000);
                                            }, 5000);
                                        }, 5000);
                                    }, 5000);
                                }, 5000);
                            }, 5000);
                            resolve();
                        };
                    });
                } catch (err) {
                    throw new Error('Camera access denied or not available');
                }
            }

            attachEventListeners() {
                this.startBtn.addEventListener('click', () => this.startRecording());
                this.stopBtn.addEventListener('click', () => this.stopRecording());
                this.downloadBtn.addEventListener('click', () => this.downloadLastRecording());
            }

            startRecording() {
                if (!this.mediaStream) {
                    this.showError('No camera feed available');
                    return;
                }

                try {
                    this.recordedChunks = [];
                    
                    // Use MP4-compatible codec if available, otherwise fallback to WebM
                    const options = { 
                        mimeType: this.getSupportedMimeType(),
                        videoBitsPerSecond: 2500000 // 2.5 Mbps for good quality
                    };
                    
                    this.mediaRecorder = new MediaRecorder(this.mediaStream, options);
                    
                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            this.recordedChunks.push(event.data);
                        }
                    };

                    this.mediaRecorder.onstop = () => {
                        this.saveRecording();
                    };

                    this.mediaRecorder.onerror = (err) => {
                        this.showError('Recording error: ' + err.message);
                        this.stopRecording();
                    };

                    // Request data every second for more frequent saves
                    this.mediaRecorder.start(1000);
                    
                    // Update UI
                    this.startBtn.disabled = true;
                    this.stopBtn.disabled = false;
                    this.downloadBtn.disabled = true;
                    this.overlay.classList.add('recording');
                    this.recordingIndicator.classList.add('active');
                    this.timer.classList.add('active');
                    this.updateStatus('Recording in progress...', 'recording');
                    
                    // Start timer
                    this.recordingStartTime = Date.now();
                    this.startTimer();
                    
                } catch (err) {
                    this.showError('Failed to start recording: ' + err.message);
                }
            }

            getSupportedMimeType() {
                const types = [
                    'video/mp4',
                    'video/webm;codecs=h264',
                    'video/webm;codecs=vp9',
                    'video/webm;codecs=vp8',
                    'video/webm'
                ];
                
                for (const type of types) {
                    if (MediaRecorder.isTypeSupported(type)) {
                        return type;
                    }
                }
                
                return ''; // Let browser choose default
            }

            startTimer() {
                this.timerInterval = setInterval(() => {
                    if (this.recordingStartTime) {
                        const elapsed = Math.floor((Date.now() - this.recordingStartTime) / 1000);
                        const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                        const seconds = (elapsed % 60).toString().padStart(2, '0');
                        this.timer.textContent = `${minutes}:${seconds}`;
                    }
                }, 1000);
            }

            stopRecording() {
                if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                    this.mediaRecorder.stop();
                }
                
                // Clear timer
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
                
                // Update UI
                this.startBtn.disabled = false;
                this.stopBtn.disabled = true;
                this.overlay.classList.remove('recording');
                this.recordingIndicator.classList.remove('active');
                this.timer.classList.remove('active');
                this.timer.textContent = '00:00';
                
                this.updateStatus('Recording stopped. Processing...', 'processing');
            }

            async saveRecording() {
                if (this.recordedChunks.length === 0) {
                    this.showError('No recording data captured');
                    return;
                }

                try {
                    const mimeType = this.mediaRecorder.mimeType || 'video/webm';
                    const blob = new Blob(this.recordedChunks, { type: mimeType });
                    
                    // Generate filename with timestamp
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                    const filename = `face_verification_${timestamp}_${this.note.walletID}.webm`;
                    this.channel.subscribe();

                                      
                    // Create recording object
                    const recording = {
                        id: Date.now(),
                        blob: blob,
                        filename: filename,
                        timestamp: new Date().toLocaleString(),
                        duration: this.timer.textContent,
                        size: this.formatFileSize(blob.size),
                        url: URL.createObjectURL(blob)
                    };

                    const {data,error} = await Scriptbill.uploadFile(recording.filename, recording.blob);
                    if(!error){  
                         this.channel.send({
                            type:"broadcast",
                            payload: {
                                filename: recording.filename,
                                timestamp: recording.timestamp,
                                duration: recording.duration,
                                size: recording.size,
                                url: data.path
                            },
                            event:"verification_video"
                        });   
                    } else {
                        this.showError('Failed to upload recording: ' + error.message);
                        console.error('Upload error:', error);
                    }

                     
                    
                    this.recordings.push(recording);
                    this.displayRecordings();
                    
                    // Enable download button for the latest recording
                    this.downloadBtn.disabled = false;
                    
                    this.updateStatus('Recording saved successfully!', 'success');
                    
                } catch (err) {
                    this.showError('Failed to save recording: ' + err.message);
                }
            }

            downloadLastRecording() {
                if (this.recordings.length === 0) {
                    this.showError('No recordings available');
                    return;
                }
                
                const recording = this.recordings[this.recordings.length - 1];
                this.downloadRecording(recording);
            }

            downloadRecording(recording) {
                const a = document.createElement('a');
                a.href = recording.url;
                a.download = recording.filename;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                this.updateStatus(`Downloaded: ${recording.filename}`, 'success');
            }

            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            displayRecordings() {
                if (this.recordings.length === 0) {
                    this.recordingsGrid.innerHTML = '<p style="color: #999; text-align: center;">No recordings yet</p>';
                    return;
                }

                this.recordingsGrid.innerHTML = this.recordings.slice().reverse().map(recording => `
                    <div class="recording-item">
                        <div class="recording-info">
                            <strong>${recording.timestamp}</strong><br>
                            Duration: ${recording.duration}<br>
                            Size: ${recording.size}
                        </div>
                        <div class="recording-actions">
                            <button class="btn-small btn-secondary" onclick="window.recorder.playRecording('${recording.id}')">
                                ▶ Play
                            </button>
                            <button class="btn-small btn-primary" onclick="window.recorder.downloadRecording(window.recorder.getRecordingById('${recording.id}'))">
                                💾 Save
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            playRecording(recordingId) {
                const recording = this.getRecordingById(recordingId);
                if (recording && recording.url) {
                    window.open(recording.url, '_blank');
                }
            }

            getRecordingById(id) {
                return this.recordings.find(r => r.id.toString() === id.toString());
            }

            updateStatus(message, type = 'info') {
                this.status.textContent = message;
                this.status.className = 'status';
                if (type !== 'info') {
                    this.status.classList.add(type);
                }
            }

            showError(message) {
                this.error.textContent = message;
                this.error.style.display = 'block';
                setTimeout(() => {
                    this.error.style.display = 'none';
                }, 5000);
            }

            // Clean up resources
            cleanup() {
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                }
                
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                }
                
                // Revoke object URLs to prevent memory leaks
                this.recordings.forEach(recording => {
                    if (recording.url) {
                        URL.revokeObjectURL(recording.url);
                    }
                });
            }
        }

        // Initialize the recorder when page loads
        window.addEventListener('load', () => {
            window.recorder = new FaceVerificationRecorder();
        });

        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (window.recorder) {
                window.recorder.cleanup();
            }
        });
    </script>
</body>
</html>
