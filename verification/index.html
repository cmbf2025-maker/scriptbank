<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Face Verification - Streamer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.95rem; }

        .signaling-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
        }
        .signaling-key-display {
            background: white;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            padding: 15px 20px;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
            word-break: break-all;
            margin: 10px 0;
        }
        .copy-key-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 25px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: #f0f0f0;
            aspect-ratio: 1 / 1;
        }
        #localVideo {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .instruction-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 20px 25px;
            border-radius: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            max-width: 80%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 20;
            pointer-events: none;
        }
        .instruction-overlay.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.05);
        }
        .instruction-icon { font-size: 32px; margin-bottom: 10px; display: block; }

        .face-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 3px dashed rgba(255,255,255,0.6);
            border-radius: 50%;
            pointer-events: none;
        }

        .webrtc-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 10px;
        }
        .status-waiting  { background: #e3f2fd; color: #1976d2; }
        .status-connecting { background: #fff3e0; color: #f57c00; }
        .status-connected  { background: #e8f5e8; color: #2e7d32; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 25px;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #4CAF50; color: white; }
        .btn-primary:hover:not(:disabled) { background: #45a049; transform: translateY(-2px); }
        .btn-danger { background: #f44336; color: white; }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
        }
        .status.success  { background: #e8f5e8; color: #2e7d32; }
        .status.error    { background: #ffebee; color: #c62828; }
        .status.warning  { background: #fff3e0; color: #f57c00; }

        @media (max-width: 768px) {
            .signaling-key-display { font-size: 16px; }
            .video-container { max-width: 350px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 WebRTC Face Verification</h1>
        <p class="subtitle">Share this key with the watcher: <strong id="signalingKeyDisplay"></strong></p>

        <div class="signaling-section">
            <div class="signaling-key-display" id="keyDisplay">Generating key…</div>
            <button class="copy-key-btn" onclick="copyKey()">📋 Copy Key</button>
            <div style="margin-top: 10px; font-size: 14px; color: #666;">
                Status: <span id="webrtcStatus" class="webrtc-status status-waiting">Waiting for watcher…</span>
            </div>
        </div>

        <div class="video-container">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="face-guide" id="faceGuide"></div>
            <div id="overlay"></div>
            <div class="instruction-overlay" id="instructionOverlay">
                <span class="instruction-icon" id="instructionIcon">📢</span>
                <div id="instructionText"></div>
            </div>
        </div>

        <div class="status" id="status">Starting camera…</div>
        <div id="error" class="status error" style="display:none;"></div>

        <div class="controls">
            <button id="startBtn" class="btn-primary" disabled>▶ Start Recording</button>
            <button id="stopBtn" class="btn-danger" disabled>⏹ Stop</button>
        </div>
    </div>

    <script src="/js/supabase.js"></script>
    <script src="/js/crypto-js.js"></script>
    <script src="/js/scriptbill.js"></script>
    <script>
        // Guard: must be logged in
        if (!Scriptbill.s.currentNote) {
            location.href = '/login';
        }

        window.copyKey = function() {
            if (!window.streamer) return;
            navigator.clipboard.writeText(window.streamer.signalingKey).then(() => {
                const btn = document.querySelector('.copy-key-btn');
                const original = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = original, 2000);
            });
        };

        // ─── Utility ──────────────────────────────────────────────────────────
        function generateSignalingKey() {
            return 'fv_' + CryptoJS.MD5(
                Date.now() + '' + Math.random() + JSON.parse(Scriptbill.s.currentNote).noteAddress
            ).toString().slice(0, 12);
        }

        function setWebRTCStatus(text, cls) {
            const el = document.getElementById('webrtcStatus');
            el.textContent = text;
            el.className = 'webrtc-status ' + cls;
        }

        // ─── Main Streamer class ───────────────────────────────────────────────
        class WebRTCStreamer {
            constructor() {
                this.video       = document.getElementById('localVideo');
                this.statusEl    = document.getElementById('status');
                this.errorEl     = document.getElementById('error');
                this.faceGuide   = document.getElementById('faceGuide');
                this.note        = JSON.parse(Scriptbill.s.currentNote);

                this.signalingKey      = generateSignalingKey();
                this.mediaStream       = null;
                this.pc                = null;
                this.supaChannel       = null;
                this.processedMessages = new Set();
                this.mediaRecorder     = null;
                this.recordedChunks    = [];
                this.recordings        = [];
                this.recordingStartTime= null;

                // Display the key immediately
                document.getElementById('keyDisplay').textContent      = this.signalingKey;
                document.getElementById('signalingKeyDisplay').textContent = this.signalingKey;

                this._boot();
            }

            // ── Boot sequence (ordered correctly) ────────────────────────────
            async _boot() {
                try {
                    await Scriptbill.init();

                    // 1. Get camera FIRST
                    await this._setupCamera();

                    // 2. Create RTCPeerConnection and add tracks
                    this._createPeerConnection();

                    // 3. Subscribe to signaling channel
                    await this._subscribeSignaling();

                    this._updateStatus('Camera ready. Share key with watcher.', 'success');
                } catch (err) {
                    console.error('Boot error:', err);
                    this._showError('Setup failed: ' + err.message);
                }
            }

            // ── Camera ────────────────────────────────────────────────────────
            async _setupCamera() {
                try {
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user', frameRate: { ideal: 30 } },
                        audio: false
                    });
                    this.video.srcObject = this.mediaStream;
                    await new Promise(resolve => {
                        this.video.onloadedmetadata = () => { this.video.play().catch(()=>{}); resolve(); };
                    });
                    console.log('[streamer] Camera ready, tracks:', this.mediaStream.getTracks().length);
                } catch (err) {
                    console.warn('[streamer] Camera unavailable, using test stream:', err.message);
                    this.mediaStream = this._makeTestStream();
                }
            }

            _makeTestStream() {
                const canvas = document.createElement('canvas');
                canvas.width = 640; canvas.height = 480;
                const ctx = canvas.getContext('2d');
                let frame = 0;
                const draw = () => {
                    const r = Math.floor(Math.sin(frame / 10)         * 127 + 128);
                    const g = Math.floor(Math.sin(frame / 10 + 2)     * 127 + 128);
                    const b = Math.floor(Math.sin(frame / 10 + 4)     * 127 + 128);
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(0, 0, 640, 480);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 48px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('TEST STREAM', 320, 240);
                    frame++;
                    requestAnimationFrame(draw);
                };
                draw();
                return canvas.captureStream(30);
            }

            // ── PeerConnection ────────────────────────────────────────────────
            _createPeerConnection() {
                this.pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun.cloudflare.com:3478' }
                    ]
                });

                // Add ALL media tracks before any offer is created
                this.mediaStream.getTracks().forEach(track => {
                    console.log('[streamer] Adding track:', track.kind);
                    this.pc.addTrack(track, this.mediaStream);
                });

                // ICE candidates → forward to channel
                this.pc.onicecandidate = (event) => {
                    if (event.candidate && this.supaChannel) {
                        this.supaChannel.send({
                            type: 'broadcast',
                            event: 'webrtc-ice',
                            payload: { ...event.candidate.toJSON(), _from: 'streamer' }
                        });
                    }
                };

                this.pc.oniceconnectionstatechange = () => {
                    console.log('[streamer] ICE state:', this.pc.iceConnectionState);
                    if (this.pc.iceConnectionState === 'connected' || this.pc.iceConnectionState === 'completed') {
                        setWebRTCStatus('Connected ✅', 'status-connected');
                    }
                };

                // DO NOT handle onnegotiationneeded automatically — we offer only on request
                this.pc.onnegotiationneeded = () => {
                    console.log('[streamer] onnegotiationneeded — waiting for watcher request-offer');
                };

                console.log('[streamer] PeerConnection created');
            }

            // ── Signaling channel ─────────────────────────────────────────────
            async _subscribeSignaling() {
                this.supabaseClient = Scriptbill.createClient();
                this.supaChannel = this.supabaseClient.channel(`webrtc-${this.signalingKey}`);

                this.supaChannel.on('broadcast', { event: 'request-offer' }, ({ payload }) => {
                    if (payload._from === 'streamer') return; // ignore own echoes
                    console.log('[streamer] request-offer received');
                    this._handleRequestOffer(payload);
                });

                this.supaChannel.on('broadcast', { event: 'webrtc-answer' }, ({ payload }) => {
                    if (payload._from === 'streamer') return;
                    this._handleAnswer(payload);
                });

                this.supaChannel.on('broadcast', { event: 'webrtc-ice' }, ({ payload }) => {
                    if (payload._from === 'streamer') return;
                    this._handleRemoteIce(payload);
                });

                this.supaChannel.on('broadcast', { event: 'instruction' }, ({ payload }) => {
                    this._showInstruction(payload.message);
                });

                await this.supaChannel.subscribe();
                console.log('[streamer] Signaling channel subscribed for key:', this.signalingKey);
            }

            // ── Offer / Answer ────────────────────────────────────────────────
            async _handleRequestOffer(payload) {
                if (payload.role !== 'watcher') return;

                try {
                    // If a previous negotiation stalled, reset the PC to stable
                    if (this.pc.signalingState !== 'stable') {
                        console.warn('[streamer] Resetting stale PC before new offer');
                        await this._resetPeerConnection();
                    }

                    const offer = await this.pc.createOffer();
                    await this.pc.setLocalDescription(offer);

                    this.supaChannel.send({
                        type: 'broadcast',
                        event: 'webrtc-offer',
                        payload: {
                            type: this.pc.localDescription.type,
                            sdp:  this.pc.localDescription.sdp,
                            msgId: Date.now(),
                            _from: 'streamer'
                        }
                    });

                    setWebRTCStatus('Offer sent 🔄', 'status-connecting');
                    console.log('[streamer] Offer sent');
                } catch (err) {
                    console.error('[streamer] Offer creation failed:', err);
                }
            }

            async _handleAnswer(payload) {
                try {
                    const msgId = payload.msgId || (payload.sdp ? payload.sdp.slice(0, 20) : null) || Date.now();
                    if (this.processedMessages.has(msgId)) {
                        console.log('[streamer] Duplicate answer ignored');
                        return;
                    }
                    this.processedMessages.add(msgId);

                    if (!payload || payload.type !== 'answer' || !payload.sdp) {
                        console.error('[streamer] Invalid answer payload');
                        return;
                    }

                    if (this.pc.signalingState !== 'have-local-offer') {
                        console.warn('[streamer] Wrong state for answer:', this.pc.signalingState);
                        return;
                    }

                    await this.pc.setRemoteDescription(new RTCSessionDescription({ type: payload.type, sdp: payload.sdp }));
                    setWebRTCStatus('Connected ✅', 'status-connected');
                    console.log('[streamer] Answer accepted — WebRTC connected');
                } catch (err) {
                    console.error('[streamer] Answer handling failed:', err);
                }
            }

            async _handleRemoteIce(payload) {
                try {
                    if (!payload || payload._from === 'streamer') return;
                    await this.pc.addIceCandidate(new RTCIceCandidate(payload));
                } catch (err) {
                    console.warn('[streamer] ICE candidate error:', err.message);
                }
            }

            // Reset and recreate PC (handles re-connect)
            async _resetPeerConnection() {
                this.processedMessages.clear();
                if (this.pc) { this.pc.close(); }
                this._createPeerConnection();
            }

            // ── Instructions ──────────────────────────────────────────────────
            _showInstruction(message) {
                const overlay  = document.getElementById('instructionOverlay');
                const textEl   = document.getElementById('instructionText');
                const iconEl   = document.getElementById('instructionIcon');
                const iconMap  = { smile: '😊', blink: '😉', left: '↖️', right: '↘️', center: '🎯' };

                textEl.textContent = message;
                iconEl.textContent = iconMap[message.toLowerCase()] || '📢';
                overlay.classList.add('show');
                setTimeout(() => overlay.classList.remove('show'), 5000);
            }

            // ── Recording ─────────────────────────────────────────────────────
            startRecording(title = '') {
                if (!this.mediaStream) { this._showError('No camera feed'); return; }
                try {
                    this.recordedChunks = [];
                    const mimeType = this._getSupportedMimeType();

                    if (!this.mediaRecorder) {
                        this.mediaRecorder = new MediaRecorder(this.mediaStream, { mimeType, videoBitsPerSecond: 1_000_000 });
                        this.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) this.recordedChunks.push(e.data); };
                        this.mediaRecorder.onstop = () => this._saveRecording(this._recordingTitle || '');
                        this.mediaRecorder.onerror = e => { this._showError('Recording error: ' + e.message); this.stopRecording(); };
                    }

                    this._recordingTitle = title;
                    if (this.mediaRecorder.state === 'recording') this.mediaRecorder.stop();
                    // Allow brief flush before re-starting
                    setTimeout(() => {
                        this.mediaRecorder.start(1000);
                        this.recordingStartTime = Date.now();
                    }, 50);
                } catch (err) {
                    this._showError('Failed to start recording: ' + err.message);
                }
            }

            stopRecording() {
                if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                    this.mediaRecorder.stop();
                }
                this.recordingStartTime = null;
                this._updateStatus('Face verification done. Processing…', 'success');
            }

            async _saveRecording(title) {
                if (!this.recordedChunks.length) return;
                try {
                    const mimeType  = this.mediaRecorder.mimeType || 'video/webm';
                    const blob      = new Blob(this.recordedChunks, { type: mimeType });
                    const ext       = mimeType.includes('mp4') ? 'mp4' : 'webm';
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                    const filename  = `face_verification_${timestamp}_${this.note.walletID}_${title}.${ext}`;

                    const { data, error } = await Scriptbill.uploadFile(filename, blob);
                    if (!error && this.supaChannel) {
                        this.supaChannel.send({
                            type: 'broadcast',
                            event: 'verification_video',
                            payload: { filename, url: data.path, timestamp: Date.now() }
                        });
                    } else if (error) {
                        console.error('[streamer] Upload error:', error);
                    }

                    this.recordedChunks = [];
                } catch (err) {
                    console.error('[streamer] Save recording failed:', err);
                }
            }

            _getSupportedMimeType() {
                const types = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm;codecs=h264', 'video/webm', 'video/mp4'];
                return types.find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';
            }

            // ── Helpers ───────────────────────────────────────────────────────
            _updateStatus(msg, type = '') {
                this.statusEl.textContent  = msg;
                this.statusEl.className    = 'status' + (type ? ' ' + type : '');
            }

            _showError(msg) {
                this.errorEl.textContent    = msg;
                this.errorEl.style.display  = 'block';
                setTimeout(() => this.errorEl.style.display = 'none', 5000);
            }

            cleanup() {
                if (this.mediaStream) this.mediaStream.getTracks().forEach(t => t.stop());
                if (this.pc) { this.pc.close(); this.pc = null; }
                if (this.supaChannel) { this.supaChannel.unsubscribe(); this.supaChannel = null; }
            }
        }

        // ── Init ────────────────────────────────────────────────────────────────
        window.addEventListener('load', () => {
            window.streamer = new WebRTCStreamer();
        });

        window.addEventListener('beforeunload', () => {
            if (window.streamer) window.streamer.cleanup();
        });
    </script>
</body>
</html>
