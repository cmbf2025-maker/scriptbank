<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Verification - Circular Frame - BACKUP</title>
    <style>
        /* COMPLETE BACKUP CSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            background: #f0f0f0;
            aspect-ratio: 1 / 1;
        }

        #video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .face-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 3px dashed rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }
        .face-guide.processing {
            border: 3px dashed rgba(175, 148, 27, 0.6);
        }

        .face-guide.danger {
            border: 3px dashed rgba(155, 16, 16, 0.6);
        }

        .face-guide.verified {
            border: 3px dashed rgba(16, 155, 16, 0.6);
        }

        .face-guide::before {
            content: "👤 Position your face here";
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-shadow: 1px 1px 3px black;
            white-space: nowrap;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            border: 4px solid #4CAF50;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .overlay.recording {
            opacity: 1;
            border-color: #f44336;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 30px rgba(244, 67, 54, 0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .recording-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .recording-indicator.active {
            opacity: 1;
        }

        .recording-dot {
            width: 12px;
            height: 12px;
            background: #f44336;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .timer {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-family: monospace;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .timer.active {
            opacity: 1;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
            justify-content: center;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }

        .btn-secondary {
            background: #9e9e9e;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #757575;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(158, 158, 158, 0.3);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            background: #f5f5f5;
            color: #333;
            transition: all 0.3s ease;
        }

        .status.recording {
            background: #ffebee;
            color: #c62828;
        }

        .status.success {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .recordings-list {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #eee;
        }

        .recordings-list h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recordings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .recording-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .recording-info {
            font-size: 0.9rem;
            color: #666;
        }

        .recording-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.85rem;
            min-width: auto;
            flex: 1;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 Face Verification</h1>
        <p class="subtitle">Position your face inside the circular guide</p>

        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <div class="face-guide" id="face-guide"></div>
            <div class="overlay" id="overlay"></div>
        </div>

        <div class="status" id="status">
        </div>

        <div id="error" class="error-message" style="display: none;"></div>

    </div>
    <script src="/js/supabase.js"></script>
    <script src="/js/crypto-js.js"></script>
    <script src="/js/scriptbill.js"></script>
    <script>
        /* COMPLETE BACKUP JS */
        if(! Scriptbill.s.currentNote){
            location.href = "/login"; 
        }
        class FaceVerificationRecorder {
            constructor() {
                this.video = document.getElementById('video');
                this.status = document.getElementById('status');
                this.error = document.getElementById('error');
                this.overlay = document.getElementById('overlay');
                this.faceGuide      = document.getElementById("face-guide")
                this.client        = Scriptbill.createClient();
                this.verifier       = "verifier";
                this.channel        = this.client.channel(this.verifier);
                this.note           = JSON.parse(Scriptbill.s.currentNote);

                this.mediaStream = null;
                this.mediaRecorder = null;
                this.recordedChunks = [];
                this.recordings = [];
                this.recordingStartTime = null;
                this.timerInterval = null;

                this.init();
            }

            async init() {
                try {
                    await this.setupCamera();
                    this.updateStatus('Camera ready. Verifying your ID.', 'ready');
                    this.faceGuide.classList.remove("danger");
                } catch (err) {
                    this.showError('Failed to access camera: ' + err.message);
                    this.faceGuide.classList.add('danger');
                    this.updateStatus('Camera access failed', 'error');
                }
            }

            async setupCamera() {
                try {
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: 'user',
                            frameRate: { ideal: 30 }
                        },
                        audio: false
                    });
                    
                    this.video.srcObject = this.mediaStream;
                    
                    return new Promise((resolve) => {
                        this.video.onloadedmetadata = () => {
                            this.video.play();
                            this.startRecording();
                            setTimeout(()=>{
                                this.updateStatus("Please place your face in the center of the circle");
                                this.startRecording("start")
                                 setTimeout(()=>{ 
                                    this.updateStatus("Please move away from the camera");
                                    this.startRecording('place-center')
                                     setTimeout(()=>{
                                        this.updateStatus("Smile");
                                        this.startRecording("move-away")
                                         setTimeout(()=>{
                                            this.updateStatus("Turn your face to the right slowly");
                                            this.startRecording("smile")
                                             setTimeout(()=>{
                                                this.updateStatus("Turn your face to the left slowly");
                                                this.startRecording("face-right")                                                
                                                setTimeout(()=>{
                                                this.updateStatus("Blink Your eyes ");
                                                this.startRecording("face-left")
                                                    setTimeout(()=>{
                                                        this.updateStatus("Please move close to the camera");
                                                        this.startRecording("blink-eyes")
                                                        setTimeout(()=>{
                                                            this.updateStatus("Smile");
                                                            this.startRecording("move-close")
                                                             setTimeout(()=>{
                                                            this.updateStatus("Blink Your eyes again");
                                                            this.startRecording("smile-two")
                                                                setTimeout(()=>{
                                                                    this.updateStatus("Turn your face to the left");
                                                                    this.startRecording("blink-eyes-two")
                                                                    setTimeout(()=>{
                                                                        this.updateStatus("Turn your face to the right");
                                                                        this.startRecording("face-left-two")
                                                                        this.title = "face-right-two";
                                                                        setTimeout(()=>this.stopRecording(), 10000)
                                                                        
                                                                    }, 10000);
                                                                }, 10000);
                                                            }, 10000);
                                                        }, 10000);
                                                    }, 10000);
                                                }, 10000);
                                            }, 10000);
                                        }, 10000);
                                    }, 10000);
                                }, 10000);
                            }, 10000);
                            resolve();
                        };
                    });
                } catch (err) {
                    throw new Error('Camera access denied or not available');
                }
            }

            attachEventListeners() {
            }

            startRecording(title="") {
                if (!this.mediaStream) {
                    this.showError('No camera feed available');
                    return;
                }

                try {
                    this.recordedChunks = [];
                    
                    const options = { 
                        mimeType: this.getSupportedMimeType(),
                        videoBitsPerSecond: 1000000
                    };

                    this.title = title;

                    if(! this.mediaRecorder){
                          this.mediaRecorder = new MediaRecorder(this.mediaStream, options);
                    
                            this.mediaRecorder.ondataavailable = (event) => {
                                if (event.data.size > 0) {
                                    this.recordedChunks.push(event.data);
                                }
                            };

                            this.mediaRecorder.onstop = () => {
                                console.log("triggered");
                                this.saveRecording( this.title  );
                            };

                            this.mediaRecorder.onerror = (err) => {
                                this.showError('Recording error: ' + err.message);
                                this.stopRecording();
                            };
                    }
                    
                  

                    if(this.recordingStartTime)
                        this.mediaRecorder.stop();
                    this.mediaRecorder.start(1000);

                    if(this.faceGuide.classList.contains("processing"))
                        this.faceGuide.classList.add("processing")
                    
                    if(this.overlay.classList.contains("recording"))
                        this.overlay.classList.add('recording');
                    
                    this.recordingStartTime = Date.now();
                    
                } catch (err) {
                    this.showError('Failed to start recording: ' + err.message);
                }
            }

            getSupportedMimeType() {
                const types = [
                    'video/webm;codecs=vp9',
                    'video/webm;codecs=vp8',
                    'video/webm;codecs=h264',
                    'video/webm',
                    'video/mp4'
                ];
                
                for (const type of types) {
                    if (MediaRecorder.isTypeSupported(type)) {
                        console.log('Using supported MIME type:', type);
                        return type;
                    }
                }
                
                console.warn('No preferred MIME type supported, using browser default');
                return 'video/webm';
            }

            getFileExtension(mimeType) {
                if (!mimeType) return 'webm';
                
                if (mimeType.includes('mp4') || mimeType.includes('mpeg')) {
                    return 'mp4';
                } else if (mimeType.includes('webm')) {
                    return 'webm';
                } else if (mimeType.includes('ogg')) {
                    return 'ogv';
                }
                
                return 'webm';
            }

            stopRecording() {
                if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                    this.mediaRecorder.stop();
                }
                
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
                
                this.overlay.classList.remove('recording');
                
                this.updateStatus('Face verification done successfully. Processing...', 'success');

                if(Scriptbill.l.toBeSavedAccount){
                    let account = JSON.parse(Scriptbill.l.toBeSavedAccount);
                    account.processing = true;
                    delete Scriptbill.l.toBeSavedAccount;
                    getAccountData().then(acc =>{
                        console.log("acc: ", acc, "note: ", note );

                        let accounts = acc[note.noteAddress].savedAccounts;

                        if(!accounts)
                            accounts = [];

                        else if(Scriptbill.isJsonable(accounts))
                            accounts    = JSON.parse(accounts)

                        const check = accounts.filter(accc => accc.accountNumber == account.accountNumber && accc.bankName == account.bankName)[0];

                        if(check ){
                            accounts = accounts.map( accc =>{
                                if( accc.accountNumber == account.accountNumber && accc.bankName == account.bankName )
                                    return account;

                                return accc;
                            })
                        } else {
                            accounts.push(account)
                        }
                        acc[note.noteAddress].savedAccounts = JSON.stringify(accounts)
                        this.faceGuide.classList.remove("processing");
                        this.faceGuide.classList.add("verified");
                        Scriptbill.setAccountData(acc).then((val)=>location.href = '/dashboard');
                    })
                    
                } else {
                    setTimeout(()=>location.href = "/dashboard", 5000);
                }
            }

            async saveRecording(title = "") {
                if (this.recordedChunks.length === 0) {
                    this.showError('No recording data captured');
                    return;
                }

                try {
                    const mimeType = this.mediaRecorder.mimeType || 'video/webm';
                    const blob = new Blob(this.recordedChunks, { type: mimeType });
                    
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                    const fileExtension = this.getFileExtension(mimeType);
                    const filename = `face_verification_${timestamp}_${this.note.walletID}_${this.title}.${fileExtension}`;
                    
                    console.log('Recording saved with MIME type:', mimeType, 'extension:', fileExtension);
                    
                    this.channel.subscribe();

                    const {data,error} = await Scriptbill.uploadFile(recording.filename, recording.blob);
                    if(!error){  
                         this.channel.send({
                            type:"broadcast",
                            payload: {
                                filename: recording.filename,
                                timestamp: recording.timestamp,
                                duration: recording.duration,
                                size: recording.size,
                                url: data.path
                            },
                            event:"verification_video"
                        });   
                    } else {
                        console.log("Downloading recording");
                        this.downloadRecording(recording);
                        console.error('Upload error:', error);
                    }

                     
                    
                    this.recordings.push(recording);
                    
                    this.faceGuide.classList.replace('processing','danger');

                    setTimeout(()=>this.faceGuide.classList.replace("danger", "processing"), 2000);
                    
                } catch (err) {
                    this.showError('Error running verification, if error persist please contact Scriptbank ');
                    console.error('failed to save verification video: ' + err.message);
                    setTimeout(()=>location.reload(), 7000);
                }
            }

            downloadLastRecording() {
                if (this.recordings.length === 0) {
                    this.showError('No recordings available');
                    return;
                }
                
                const recording = this.recordings[this.recordings.length - 1];
                this.downloadRecording(recording);
            }

            downloadRecording(recording) {
                const a = document.createElement('a');
                a.href = recording.url;
                a.download = recording.filename;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                this.updateStatus(`Downloaded: ${recording.filename}`, 'success');
            }

            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            updateStatus(message, type = 'info') {
                this.status.textContent = message;
                this.status.className = 'status';
                if (type !== 'info') {
                    this.status.classList.add(type);
                }
            }

            showError(message) {
                this.error.textContent = message;
                this.error.style.display = 'block';
                setTimeout(() => {
                    this.error.style.display = 'none';
                }, 5000);
            }

            cleanup() {
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                }
                
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                }
                
                this.recordings.forEach(recording => {
                    if (recording.url) {
                        URL.revokeObjectURL(recording.url);
                    }
                });
            }
        }

        // Initialize the recorder when page loads
        window.addEventListener('load', () => {
            window.recorder = new FaceVerificationRecorder();
        });

        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (window.recorder) {
                window.recorder.cleanup();
            }
        });
    </script>
</body>
</html>
